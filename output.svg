<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Arrowhead definition -->
  <g id="arrow_defs">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
      </marker>
    </defs>
  </g>

  <!-- Client block -->
  <g id="client">
    <rect x="100" y="250" width="150" height="100" fill="#e0f7fa" stroke="#006064" stroke-width="2"/>
    <text x="175" y="300" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#006064">Client</text>
  </g>

  <!-- Server block -->
  <g id="server">
    <rect x="750" y="250" width="150" height="100" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
    <text x="825" y="300" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#e65100">Server</text>
  </g>

  <!-- SYN packet -->
  <g id="syn">
    <line x1="250" y1="300" x2="750" y2="300" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="500" y="285" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">SYN, Seq = x</text>
  </g>

  <!-- SYN‑ACK packet -->
  <g id="synack">
    <line x1="750" y1="350" x2="250" y2="350" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="500" y="365" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">SYN‑ACK, Ack = x+1, Seq = y</text>
  </g>

  <!-- ACK packet -->
  <g id="ack">
    <line x1="250" y1="400" x2="750" y2="400" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="500" y="415" font-family="sans-serif" font-size="16" text-anchor="middle" fill="black">ACK, Ack = y+1</text>
  </g>
</svg>